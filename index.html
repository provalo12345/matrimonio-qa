<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domande agli Sposi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0ead8;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem;font-family:'Inter',sans-serif}
.card{background:#faf5e4;border-radius:16px;width:100%;max-width:560px;padding:2.5rem 2rem 2rem}
.eye{text-align:center;font-size:11px;letter-spacing:.17em;color:#a08840;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:10px}
.eye::before,.eye::after{content:'';display:block;width:48px;height:.5px;background:#a08840;opacity:.6}
h1{font-family:'Playfair Display',serif;font-size:26px;font-weight:400;color:#2c2010;text-align:center;margin-bottom:8px;line-height:1.3}
.sub{font-size:14px;color:#8a7650;text-align:center;margin-bottom:22px}
.orn{display:flex;align-items:center;justify-content:center;gap:12px;opacity:.55;margin-bottom:24px;color:#a08840}
.orn::before,.orn::after{content:'';display:block;width:55px;height:.5px;background:#a08840}
.fb{background:rgba(255,255,255,.54);border:.5px solid rgba(160,136,64,.22);border-radius:12px;padding:1.25rem;margin-bottom:1.5rem}
label{display:block;font-size:13px;color:#8a7650;margin-bottom:5px}
.fr{margin-bottom:12px}
.fr:last-child{margin-bottom:0}
input,textarea{width:100%;background:rgba(255,255,255,.78);border:.5px solid rgba(160,136,64,.3);border-radius:8px;padding:9px 12px;font-size:14px;font-family:'Inter',sans-serif;color:#2c2010;outline:none;transition:border-color .15s}
input:focus,textarea:focus{border-color:#a08840}
input::placeholder,textarea::placeholder{color:#b0a080}
textarea{resize:vertical;min-height:76px}
.rb{width:100%;background:#b25070;color:#fff;border:none;padding:11px 20px;border-radius:8px;font-family:'Inter',sans-serif;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}
.rb:hover{background:#8a3352}
.rb:disabled{opacity:.5;cursor:not-allowed}
.smsg{display:none;background:rgba(46,125,50,.1);color:#2a6e2e;border-radius:8px;padding:9px 12px;font-size:13px;margin-bottom:12px;align-items:center;gap:6px}
.qhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.qtl{font-size:13px;font-weight:500;color:#8a7650}
.qts{font-size:11px;color:#b0a080;transition:opacity .3s}
.qc{background:rgba(255,255,255,.54);border:.5px solid rgba(160,136,64,.22);border-radius:12px;padding:1rem 1.25rem;margin-bottom:10px;position:relative;transition:border-color .15s}
.qc:hover{border-color:rgba(160,136,64,.42)}
.qx{font-family:'Playfair Display',serif;font-size:17px;color:#2c2010;margin-bottom:10px;line-height:1.55;padding-right:82px}
.qm{font-size:12px;color:#b0a080;display:flex;align-items:center;gap:6px}
.qn{color:#b25070;font-weight:500}
.dbt{position:absolute;top:10px;right:10px;background:none;border:.5px solid rgba(192,80,80,.4);color:#c05050;border-radius:8px;padding:4px 9px;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif}
.dbt:hover{background:rgba(192,80,80,.08)}
.emp{text-align:center;padding:2.5rem 1rem;color:#b0a080;font-size:14px}
.ab{border-top:.5px solid rgba(160,136,64,.22);padding-top:1rem;margin-top:1.5rem;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.asp{flex:1}.ast{font-size:12px;color:#b0a080}.ast.on{color:#c05050}
.atg{background:none;border:.5px solid rgba(160,136,64,.22);border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer;color:#b0a080;font-family:'Inter',sans-serif}
.atg:hover{background:rgba(160,136,64,.07)}.atg.on{border-color:rgba(192,80,80,.4);color:#c05050}
.pwf{display:none;width:100%;margin-top:10px;background:rgba(255,255,255,.54);border:.5px solid rgba(160,136,64,.22);border-radius:12px;padding:1rem;flex-direction:column;gap:8px}
.pwr{display:flex;gap:8px}.pwr input{flex:1}
.pwc{background:none;border:.5px solid rgba(160,136,64,.3);border-radius:8px;padding:8px 14px;cursor:pointer;font-size:14px;color:#8a7650;font-family:'Inter',sans-serif}
.pwk{background:#b25070;color:#fff;border:none;border-radius:8px;padding:8px 16px;cursor:pointer;font-size:14px;font-family:'Inter',sans-serif}
.pwk:hover{background:#8a3352}
.pwe{display:none;font-size:12px;color:#c05050}
.err{background:rgba(192,80,80,.08);border:.5px solid rgba(192,80,80,.25);border-radius:8px;padding:9px 12px;font-size:13px;color:#c05050;margin-bottom:12px;display:none}
</style>
</head>
<body>
<div class="card">
  <p class="eye">&#9825; Cerimonia</p>
  <h1>Hai una domanda per gli sposi?</h1>
  <p class="sub">Scrivila qui sotto &mdash; la vedranno tutti gli invitati</p>
  <div class="orn">&#10022;</div>

  <div class="fb">
    <div id="smsg" class="smsg">&#10003; Domanda inviata!</div>
    <div id="errmsg" class="err">Errore nell'invio, riprova.</div>
    <div class="fr">
      <label for="qname">Il tuo nome <span style="color:#b0a080;font-weight:400">(facoltativo)</span></label>
      <input type="text" id="qname" placeholder="es. Marco e Federica"/>
    </div>
    <div class="fr">
      <label for="qtext">La tua domanda <span style="color:#b25070">*</span></label>
      <textarea id="qtext" rows="3" placeholder="Scrivi qui la tua domanda..."></textarea>
    </div>
    <div class="fr">
      <button class="rb" onclick="subQ()" id="sbtn">&#9658; Invia domanda</button>
    </div>
  </div>

  <div class="qhd">
    <span class="qtl"><span id="qlbl">Caricamento...</span></span>
    <span class="qts" id="qts"></span>
  </div>
  <div id="ql"></div>

  <div class="ab">
    <span class="ast" id="ast"></span>
    <span class="asp"></span>
    <button class="atg" id="atg" onclick="clickA()">&#128274; Admin</button>
    <div class="pwf" id="pwf">
      <label for="pwi">Password admin</label>
      <div class="pwr">
        <input type="password" id="pwi" placeholder="password" onkeydown="if(event.key==='Enter')okPw()"/>
        <button class="pwk" onclick="okPw()">Accedi</button>
        <button class="pwc" onclick="closePw()">Annulla</button>
      </div>
      <span class="pwe" id="pwe">Password errata</span>
    </div>
  </div>
</div>

<script>
const TOKEN = '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';
const API   = 'https://api.github.com/repos/provalo12345/matrimonio-qa/issues';
const HDRS  = {
  'Authorization': 'Bearer ' + TOKEN,
  'Accept': 'application/vnd.github.v3+json',
  'Content-Type': 'application/json'
};
const PW = 'sposi2026';
let isA = false, qs = [];

function ft(ts){ return new Date(ts).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'}); }
function esc(s){ const d=document.createElement('div'); d.appendChild(document.createTextNode(s)); return d.innerHTML; }

async function loadQ(silent) {
  try {
    const r = await fetch(API + '?state=open&per_page=100&sort=created&direction=desc', {headers: HDRS});
    const data = await r.json();
    qs = Array.isArray(data)
      ? data.filter(i => !i.pull_request).map(i => ({
          number: i.number,
          text: i.title,
          name: (i.body && i.body.trim() && i.body.trim() !== '-') ? i.body.trim() : null,
          ts: new Date(i.created_at).getTime()
        }))
      : [];
  } catch(e) { qs = []; }
  render();
  if (silent) {
    const el = document.getElementById('qts');
    el.style.opacity = '1';
    el.textContent = 'agg. ' + ft(Date.now());
    setTimeout(() => { el.style.opacity = '0'; }, 2000);
  }
}

function render() {
  const list = document.getElementById('ql');
  const lbl  = document.getElementById('qlbl');
  const n = qs.length;
  lbl.textContent = n === 0 ? 'Nessuna domanda ancora' : n === 1 ? '1 domanda' : n + ' domande';
  if (n === 0) { list.innerHTML = '<div class="emp">Sii il primo a fare una domanda!</div>'; return; }
  list.innerHTML = qs.map(q => `<div class="qc">
    ${isA ? `<button class="dbt" onclick="delQ(${q.number})">&#128465; Elimina</button>` : ''}
    <p class="qx">${esc(q.text)}</p>
    <div class="qm">${q.name ? `<span class="qn">${esc(q.name)}</span><span>&middot;</span>` : ''}<span>${ft(q.ts)}</span></div>
  </div>`).join('');
}

async function subQ() {
  const text = document.getElementById('qtext').value.trim();
  if (!text) { document.getElementById('qtext').focus(); return; }
  const name = document.getElementById('qname').value.trim();
  const btn  = document.getElementById('sbtn');
  btn.disabled = true; btn.textContent = 'Invio...';
  try {
    const r = await fetch(API, {
      method: 'POST',
      headers: HDRS,
      body: JSON.stringify({ title: text, body: name || '-' })
    });
    if (r.ok) {
      document.getElementById('qtext').value = '';
      document.getElementById('qname').value = '';
      const sm = document.getElementById('smsg');
      sm.style.display = 'flex';
      setTimeout(() => { sm.style.display = 'none'; }, 3500);
      await loadQ(false);
    } else {
      document.getElementById('errmsg').style.display = 'block';
      setTimeout(() => { document.getElementById('errmsg').style.display = 'none'; }, 4000);
    }
  } catch(e) {
    document.getElementById('errmsg').style.display = 'block';
    setTimeout(() => { document.getElementById('errmsg').style.display = 'none'; }, 4000);
  }
  btn.disabled = false; btn.innerHTML = '&#9658; Invia domanda';
}

async function delQ(num) {
  if (!isA) return;
  await fetch(API + '/' + num, {
    method: 'PATCH', headers: HDRS,
    body: JSON.stringify({ state: 'closed' })
  });
  await loadQ(false);
}

function clickA() {
  if (isA) {
    isA = false;
    document.getElementById('atg').className = 'atg';
    document.getElementById('atg').textContent = '\uD83D\uDD12 Admin';
    document.getElementById('ast').textContent = '';
    document.getElementById('ast').className = 'ast';
    render(); return;
  }
  const pf = document.getElementById('pwf');
  const open = pf.style.display === 'flex';
  pf.style.display = open ? 'none' : 'flex';
  pf.style.flexDirection = 'column';
  if (!open) document.getElementById('pwi').focus();
}

function okPw() {
  if (document.getElementById('pwi').value === PW) {
    isA = true; closePw();
    document.getElementById('atg').className = 'atg on';
    document.getElementById('atg').textContent = 'Esci da admin';
    document.getElementById('ast').textContent = 'Modalit\u00e0 admin attiva';
    document.getElementById('ast').className = 'ast on';
    render();
  } else {
    document.getElementById('pwe').style.display = 'block';
    document.getElementById('pwi').value = '';
    document.getElementById('pwi').focus();
    setTimeout(() => { document.getElementById('pwe').style.display = 'none'; }, 2500);
  }
}

function closePw() {
  document.getElementById('pwf').style.display = 'none';
  document.getElementById('pwi').value = '';
  document.getElementById('pwe').style.display = 'none';
}

loadQ(false);
setInterval(() => loadQ(true), 20000);
</script>
</body>
</html>
